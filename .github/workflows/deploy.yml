name: Build and Deploy to Azure

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ASPNETCORE_CONTENTROOT: C:\home\site\wwwroot

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore MedTracker.sln

      - name: Build
        run: dotnet build MedTracker.sln --configuration Release --no-restore

      - name: Publish
        run: dotnet publish MedTracker.sln -c Release -o ./publish

      - name: Install EF Tools
        run: dotnet tool install --global dotnet-ef

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: medtracker   # ← replace with your Azure app name
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish
